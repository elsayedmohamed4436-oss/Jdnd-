<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Santa Snow | مملكة الثلج</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<script src="https://unpkg.com/tonweb/dist/tonweb.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --primary: #00E5FF;
  --primary-dark: #00ACC1;
  --gold: #FFD966;
  --gold-dark: #FFB347;
  --dark-bg: #0A0F1E;
  --card-bg: rgba(15, 25, 45, 0.85);
  --glass: rgba(255, 255, 255, 0.08);
  --border: rgba(255, 255, 255, 0.1);
  --text: #FFFFFF;
  --text-muted: rgba(255, 255, 255, 0.6);
  --success: #00E676;
  --warning: #FFB74D;
  --error: #FF5252;
}

body {
  font-family: 'Cairo', sans-serif;
  background: #0A0F1E;
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 85px;
  overflow-x: hidden;
  position: relative;
}

/* خلفية متحركة */
.animated-bg {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(135deg, #0A0F1E 0%, #1A2A3A 50%, #0F172A 100%);
  z-index: -2;
}

.animated-bg::before {
  content: '';
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 20% 40%, rgba(0, 229, 255, 0.08) 0%, transparent 50%);
  animation: bgMove 20s ease-in-out infinite;
}

@keyframes bgMove {
  0%, 100% { transform: translate(-20%, -20%); }
  50% { transform: translate(0%, 0%); }
}

/* شاشة التحميل */
#loadingScreen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: url('https://i.supaimg.com/6da94571-9f1f-45c0-a629-23bfc48c3905/ee3d15b9-4c4b-4a50-ba6e-5e0b9f526179.png') center/cover no-repeat;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 30px;
  transition: opacity 0.8s ease;
}

#loadingScreen.hidden {
  opacity: 0;
  pointer-events: none;
}

.loading-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
}

.loading-content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 20px;
}

.ld-logo {
  width: 140px;
  height: 140px;
  animation: floatLogo 2s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.6));
  margin-bottom: 20px;
}

@keyframes floatLogo {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

.ld-title {
  font-size: 32px;
  font-weight: 900;
  background: linear-gradient(135deg, #fff, var(--primary));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 10px;
  letter-spacing: 2px;
}

.ld-sub {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 30px;
}

/* شريط تحميل عصري */
.loader-wrapper {
  width: 280px;
  position: relative;
}

.loader-track {
  width: 100%;
  height: 8px;
  background: rgba(255, 255, 255, 0.15);
  border-radius: 20px;
  overflow: hidden;
  position: relative;
}

.loader-fill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--primary-dark), var(--gold));
  border-radius: 20px;
  position: relative;
  transition: width 0.3s ease;
  animation: fillGlow 1.5s ease-in-out infinite;
}

@keyframes fillGlow {
  0%, 100% { box-shadow: 0 0 5px var(--primary); }
  50% { box-shadow: 0 0 20px var(--primary), 0 0 10px var(--gold); }
}

.loader-percent {
  font-size: 14px;
  font-weight: 800;
  color: var(--primary);
  text-align: center;
  margin-top: 12px;
  letter-spacing: 1px;
}

/* الشريط العلوي الجديد */
.gradient-topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 12px 16px;
  background: linear-gradient(135deg, rgba(10, 15, 30, 0.95), rgba(20, 30, 50, 0.95));
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0, 229, 255, 0.2);
  display: flex;
  align-items: center;
  gap: 12px;
}

.user-avatar-ring {
  position: relative;
  width: 52px;
  height: 52px;
  flex-shrink: 0;
}

.user-avatar-ring::before {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--gold));
  animation: ringSpin 3s linear infinite;
}

@keyframes ringSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.user-avatar {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: linear-gradient(135deg, #1E2A3A, #0F172A);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  position: relative;
  z-index: 1;
  overflow: hidden;
}

.user-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.balances-container {
  flex: 1;
  display: flex;
  gap: 12px;
}

.balance-card-mini {
  flex: 1;
  background: linear-gradient(135deg, rgba(0, 229, 255, 0.1), rgba(0, 0, 0, 0.3));
  border: 1px solid rgba(0, 229, 255, 0.2);
  border-radius: 20px;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}

.balance-card-mini:hover {
  transform: translateY(-2px);
  border-color: var(--primary);
}

.balance-icon {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 229, 255, 0.2);
  border-radius: 12px;
}

.balance-icon img {
  width: 28px;
  height: 28px;
  object-fit: contain;
}

.balance-info {
  flex: 1;
}

.balance-label {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 600;
}

.balance-value {
  font-size: 16px;
  font-weight: 800;
  color: #fff;
  line-height: 1.2;
}

.lang-glow-btn {
  background: linear-gradient(135deg, rgba(0, 229, 255, 0.2), rgba(255, 217, 102, 0.1));
  border: 1px solid rgba(0, 229, 255, 0.3);
  border-radius: 30px;
  padding: 8px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
  flex-shrink: 0;
}

.lang-glow-btn:active {
  transform: scale(0.95);
}

/* صفحة Home المطورة */
.home-hero {
  padding: 20px 16px;
}

.hero-glow-card {
  background: linear-gradient(145deg, rgba(20, 30, 50, 0.9), rgba(10, 15, 30, 0.9));
  border-radius: 32px;
  border: 1px solid rgba(0, 229, 255, 0.2);
  padding: 24px 20px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
}

.hero-glow-card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0, 229, 255, 0.1), transparent);
  animation: cardGlow 8s linear infinite;
}

@keyframes cardGlow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.santa-character {
  text-align: center;
  margin-bottom: 20px;
  position: relative;
  cursor: pointer;
}

.santa-character img {
  width: 180px;
  height: auto;
  filter: drop-shadow(0 10px 30px rgba(0, 229, 255, 0.4));
  transition: transform 0.2s ease;
  animation: santaWave 3s ease-in-out infinite;
}

@keyframes santaWave {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-8px) rotate(2deg); }
}

.santa-character:active img {
  transform: scale(0.92);
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}

.stat-glass-card {
  background: rgba(0, 0, 0, 0.4);
  border-radius: 20px;
  padding: 14px;
  text-align: center;
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.stat-icon {
  font-size: 28px;
  margin-bottom: 8px;
}

.stat-value {
  font-size: 24px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
}

.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 5px;
}

.storage-section {
  margin-bottom: 16px;
}

.storage-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.storage-title {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 600;
}

.storage-level {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
}

.storage-level:active {
  transform: scale(0.95);
}

.storage-progress {
  background: rgba(0, 0, 0, 0.4);
  border-radius: 16px;
  height: 12px;
  overflow: hidden;
  margin-bottom: 8px;
}

.storage-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--gold));
  border-radius: 16px;
  width: 0%;
  transition: width 0.3s ease;
  position: relative;
  overflow: hidden;
}

.storage-fill::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
  animation: shine 2s infinite;
}

@keyframes shine {
  100% { left: 100%; }
}

.storage-amount {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-muted);
}

.claim-button {
  width: 100%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  border-radius: 24px;
  padding: 16px;
  color: white;
  font-size: 16px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}

.claim-button::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.3);
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s;
}

.claim-button:active::before {
  width: 300px;
  height: 300px;
}

.claim-button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.machine-shop-button {
  width: 100%;
  background: linear-gradient(135deg, rgba(0, 229, 255, 0.15), rgba(0, 0, 0, 0.4));
  border: 2px solid rgba(0, 229, 255, 0.3);
  border-radius: 24px;
  padding: 14px;
  color: var(--primary);
  font-size: 14px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.machine-shop-button:active {
  transform: scale(0.98);
  background: rgba(0, 229, 255, 0.25);
}

/* صفحة Tasks المطورة */
.tasks-header {
  padding: 20px 16px 0;
}

.tasks-tabs {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  background: rgba(0, 0, 0, 0.3);
  padding: 6px;
  border-radius: 60px;
}

.task-tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  background: transparent;
  border: none;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 800;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.task-tab.active {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
}

.tasks-container {
  padding: 0 16px 20px;
}

.task-category-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  background: rgba(0, 0, 0, 0.2);
  padding: 4px;
  border-radius: 40px;
}

.category-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  border-radius: 30px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.2s;
}

.category-tab.active {
  background: rgba(0, 229, 255, 0.2);
  color: var(--primary);
}

.task-card {
  background: linear-gradient(135deg, rgba(20, 30, 50, 0.8), rgba(10, 15, 30, 0.8));
  border-radius: 24px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 0.2s;
}

.task-card:hover {
  transform: translateX(4px);
  border-color: rgba(0, 229, 255, 0.3);
}

.task-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, rgba(0, 229, 255, 0.15), rgba(0, 0, 0, 0.3));
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  flex-shrink: 0;
}

.task-info {
  flex: 1;
}

.task-name {
  font-size: 15px;
  font-weight: 800;
  margin-bottom: 4px;
}

.task-reward {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--gold);
  font-weight: 700;
}

.task-reward img {
  width: 18px;
  height: 18px;
  object-fit: contain;
}

.task-progress {
  margin-top: 8px;
}

.progress-track {
  background: rgba(0, 0, 0, 0.4);
  border-radius: 10px;
  height: 6px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--gold));
  border-radius: 10px;
  width: 0%;
}

.task-button {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  border-radius: 16px;
  padding: 10px 20px;
  color: white;
  font-size: 12px;
  font-weight: 800;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}

.task-button:active {
  transform: scale(0.95);
}

.task-button.done {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text-muted);
  cursor: default;
}

.task-button.done:active {
  transform: none;
}

/* باقي الأنماط مع الحفاظ على الوظائف */
.sec {
  display: none;
  animation: fadeIn 0.3s ease;
}

.sec.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.notif {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: rgba(10, 20, 35, 0.98);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(0, 229, 255, 0.3);
  border-radius: 50px;
  padding: 12px 24px;
  font-size: 13px;
  font-weight: 700;
  z-index: 1000;
  transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  white-space: nowrap;
  max-width: 90vw;
  white-space: normal;
  text-align: center;
}

.notif.show {
  transform: translateX(-50%) translateY(0);
}

.notif.success { background: rgba(0, 230, 118, 0.2); border-color: var(--success); color: var(--success); }
.notif.error { background: rgba(255, 82, 82, 0.2); border-color: var(--error); color: var(--error); }
.notif.warning { background: rgba(255, 183, 77, 0.2); border-color: var(--warning); color: var(--warning); }

.bnav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10, 15, 30, 0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(0, 229, 255, 0.2);
  display: flex;
  padding: 8px 16px 20px;
  gap: 8px;
  z-index: 200;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 0;
  cursor: pointer;
  border-radius: 16px;
  transition: all 0.2s;
}

.nav-item.active {
  background: linear-gradient(135deg, rgba(0, 229, 255, 0.15), rgba(0, 0, 0, 0.2));
}

.nav-icon {
  font-size: 24px;
  transition: all 0.2s;
}

.nav-item.active .nav-icon {
  transform: translateY(-2px);
  color: var(--primary);
  text-shadow: 0 0 10px var(--primary);
}

.nav-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
}

.nav-item.active .nav-label {
  color: var(--primary);
}

/* مودالات وباقي العناصر */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(8px);
  z-index: 500;
  align-items: center;
  justify-content: center;
}

.modal.active {
  display: flex;
}

.modal-content {
  background: linear-gradient(145deg, #1A2538, #0F172A);
  border-radius: 32px;
  padding: 20px;
  width: 90%;
  max-width: 400px;
  max-height: 80vh;
  overflow-y: auto;
  border: 1px solid rgba(0, 229, 255, 0.3);
  animation: modalSlide 0.3s ease;
}

@keyframes modalSlide {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.modal-title {
  font-size: 18px;
  font-weight: 800;
  color: var(--primary);
}

.modal-close {
  background: rgba(255, 255, 255, 0.1);
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  cursor: pointer;
  color: white;
  transition: all 0.2s;
}

.modal-close:active {
  transform: scale(0.9);
}

/* دعم الشاشات الصغيرة */
@media (max-width: 480px) {
  .balance-card-mini {
    padding: 6px 10px;
  }
  
  .balance-value {
    font-size: 14px;
  }
  
  .santa-character img {
    width: 140px;
  }
  
  .stat-value {
    font-size: 20px;
  }
}

.snow-particle {
  position: fixed;
  pointer-events: none;
  z-index: 1000;
  animation: particleFall 1s ease-out forwards;
}

@keyframes particleFall {
  0% {
    transform: translateY(0) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translateY(100px) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>
<body>

<div class="animated-bg"></div>

<div id="loadingScreen">
  <div class="loading-overlay"></div>
  <div class="loading-content">
    <img class="ld-logo" src="https://i.supaimg.com/6da94571-9f1f-45c0-a629-23bfc48c3905/d1d987fb-c961-412c-96f4-249ce3896614.png" alt="Santa Snow">
    <div class="ld-title">SANTA SNOW</div>
    <div class="ld-sub" id="ldStatus">جاري التحميل...</div>
    <div class="loader-wrapper">
      <div class="loader-track">
        <div class="loader-fill" id="loaderFill"></div>
      </div>
      <div class="loader-percent" id="loaderPercent">0%</div>
    </div>
  </div>
</div>

<!-- الشريط العلوي الجديد -->
<div class="gradient-topbar">
  <div class="user-avatar-ring">
    <div class="user-avatar" id="userAvatar">
      <div>🎅</div>
    </div>
  </div>
  <div class="balances-container">
    <div class="balance-card-mini">
      <div class="balance-icon">
        <img src="https://i.supaimg.com/6da94571-9f1f-45c0-a629-23bfc48c3905/8e508aa3-9d0d-4eb3-a578-7cfbbae9ddc2.png" alt="Snow">
      </div>
      <div class="balance-info">
        <div class="balance-label">SNOW</div>
        <div class="balance-value" id="topSnow">0</div>
      </div>
    </div>

const S = {
  userId: null, startParam: '', user: { snow: 0, miningRate: 0, miningLevel: 1, miningMachines: {1:0,2:0,3:0}, totalEarned: 0, storageLevel: 1, hasDeposited: false, tonBalance: 0, referralCount: 0, welcomeChestOpened: false, hasWelcomeMachine: false },
  refs: [], exchHist: [], wdHist: [], doneTasks: [], tasks: { partner: [], community: [] }, storageProgress: 0, storageInt: null, tg: null, tonUI: null, wallet: null, _collectCooldown: false, isNewUser: false,
};

let _lastClickTime = 0, _apiInFlight = 0, _nt = null, _taskInFlight = new Set(), _atType = 'channel', _submitInFlight = false, _socTab = 'partner';

function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

async function api(action, data = {}) {
  if (_apiInFlight > 8) throw new Error('Too many requests');
  _apiInFlight++;
  try {
    const h = { 'Content-Type': 'application/json' };
    if (S.tg?.initData) h.Authorization = `Telegram ${S.tg.initData}`;
    const r = await fetch(`${CFG.API_URL}/api`, { method: 'POST', headers: h, body: JSON.stringify({ action, data }) });
    const j = await r.json();
    if (!j.success) throw new Error(j.error || 'API error');
    return j.data;
  } finally { _apiInFlight--; }
}

function showNotif(msg, type = 'i') {
  const el = document.getElementById('notif');
  if (!el) return;
  if (_nt) { clearTimeout(_nt); _nt = null; }
  el.classList.remove('show');
  el.innerHTML = msg;
  el.className = `notif ${type === 's' ? 'success' : type === 'e' ? 'error' : type === 'w' ? 'warning' : ''}`;
  setTimeout(() => el.classList.add('show'), 10);
  _nt = setTimeout(() => { el.classList.remove('show'); _nt = null; }, 3000);
}

function fmt(n) { n = Math.floor(n || 0); if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M'; if (n >= 1000) return (n / 1000).toFixed(1) + 'K'; return n.toString(); }
function fmtTon(n) { if (n === undefined || n === null) return '0'; if (n >= 1000) return (n / 1000).toFixed(1) + 'K'; if (n >= 1) return n.toFixed(2); if (n > 0) return n.toFixed(4); return n.toString(); }

async function loadState() {
  try {
    const startParam = S.startParam || '';
    const d = await api('getState', { start_param: startParam, _initData: S.tg?.initData || '' });
    S.user = d.user || S.user;
    S.refs = d.referrals || [];
    S.exchHist = d.exchHistory || [];
    S.wdHist = d.wdHistory || [];
    S.doneTasks = d.completedTasks || [];
    S.tasks = d.tasks || { partner: [], community: [] };
    if (d.user && d.user.storageAccrued !== undefined) S.storageProgress = parseFloat(d.user.storageAccrued) || 0;
    if (!S.user.welcomeChestOpened && S.user.snow === 0 && !S.user.hasWelcomeMachine) S.isNewUser = true;
    else S.isNewUser = false;
    updateRefUI();
  } catch (e) { console.warn('loadState:', e.message); showNotif('فشل تحميل البيانات: ' + e.message, 'e'); }
  updateUI();
}

function updateUI() {
  const u = S.user;
  document.getElementById('topSnow').textContent = fmt(u.snow || 0);
  document.getElementById('topTon').textContent = fmtTon(u.tonBalance || 0);
  const rateDay = Math.round((u.miningRate || 0) * 24);
  document.getElementById('heroRateDay').textContent = fmt(rateDay);
  const lv = u.storageLevel || 1, cfg = STORAGE_LVS[lv] || STORAGE_LVS[1];
  document.getElementById('storageMax').textContent = fmt(cfg.cap);
  document.getElementById('storageLvDisp').textContent = lv;
  const pct = Math.min(100, Math.round((S.storageProgress / cfg.cap) * 100));
  document.getElementById('storageFill').style.width = pct + '%';
  document.getElementById('storageCurrent').textContent = Math.floor(S.storageProgress);
  document.getElementById('heroAccrued').textContent = S.storageProgress.toFixed(6);
  const btn = document.getElementById('collectBtn');
  const has = S.storageProgress >= 1;
  btn.disabled = !has;
  document.getElementById('claimPct').textContent = pct + '%';
  document.getElementById('claimBtnText').innerHTML = has ? `<i class="fas fa-snowflake"></i> جمع ${fmt(Math.floor(S.storageProgress))} ثلج` : `<i class="fas fa-snowflake"></i> المخزن فارغ`;
  updateSwapBals();
  renderExchHist();
  renderWdHist();
  renderTasks();
}

function startStorage() {
  if (S.storageInt) clearInterval(S.storageInt);
  S.storageInt = setInterval(() => {
    const u = S.user, lv = u.storageLevel || 1, cfg = STORAGE_LVS[lv] || STORAGE_LVS[1], rate = u.miningRate || 0;
    if (rate <= 0) return;
    S.storageProgress += (rate / 3600);
    if (S.storageProgress > cfg.cap) S.storageProgress = cfg.cap;
    updateUI();
  }, 1000);
}

async function collectSnow() {
  if (S._collectCooldown) return;
  const now = Date.now();
  if (now - _lastClickTime < 3000) { showNotif('الرجاء الانتظار 3 ثواني!', 'w'); return; }
  _lastClickTime = now;
  const amt = Math.floor(S.storageProgress);
  if (amt < 1) { showNotif('المخزن فارغ!', 'e'); return; }
  S._collectCooldown = true;
  setTimeout(() => S._collectCooldown = false, 3000);
  S.user.snow = (S.user.snow || 0) + amt;
  S.user.totalEarned = (S.user.totalEarned || 0) + amt;
  S.storageProgress = 0;
  updateUI();
  showNotif(`+${fmt(amt)} ثلج تم جمعه!`, 's');
  api('collect', { amount: amt }).catch(() => {});
}

  const now = Date.now();

function renderTasks() {
  const referralCount = S.user.referralCount || 0;
  let refHtml = '';
  for (const task of REF_TASKS) {
    const completed = S.doneTasks.includes(task.id);
    const canClaim = referralCount >= task.n && !completed;
    const progress = Math.min(100, Math.round((referralCount / task.n) * 100));
    refHtml += `<div class="task-card"><div class="task-icon">${task.icon}</div><div class="task-info"><div class="task-name">${task.name}</div><div class="task-reward"><img src="${SNOW_IMG}"> +${fmt(task.snow)}</div><div class="task-progress"><div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div><div style="font-size:10px;margin-top:4px;">${referralCount}/${task.n}</div></div></div>${completed ? '<button class="task-button done">✅ مكتمل</button>' : canClaim ? `<button class="task-button" onclick="claimRefTask(\'${task.id}\')">🎁 استلام</button>` : `<button class="task-button" style="background:rgba(255,255,255,0.1);">🔒 ${task.n}</button>`}</div>`;
  }
  document.getElementById('referralTasksList').innerHTML = refHtml || '<div class="hero-glow-card" style="text-align:center;padding:30px;">✨ قم بدعوة الأصدقاء للحصول على المكافآت ✨</div>';
  renderSocTasks();
}

function renderSocTasks() {
  const p = S.tasks?.partner || [], c = S.tasks?.community || [];
  const renderList = (tasks, isPartner) => tasks.map(t => `<div class="task-card"><div class="task-icon">${t.type === 'channel' ? '📢' : '🤖'}</div><div class="task-info"><div class="task-name">${esc(t.name || 'مهمة')}</div><div class="task-reward"><img src="${SNOW_IMG}"> +${fmt(t.snowReward || 50)}</div>${t.completions ? `<div style="font-size:11px;color:var(--text-muted);">${t.completions}/${t.targetUsers} مكتمل</div>` : ''}</div>${S.doneTasks.includes(t.id) ? '<button class="task-button done">✅</button>' : `<button class="task-button" onclick="doTask(\'${t.id}\',\'${t.link}\',\'${t.type}\',\'${isPartner ? 'partner' : 'community'}\')">➡️ تنفيذ</button>`}</div>`).join('');
  document.getElementById('partnerTasksList').innerHTML = renderList(p, true) || '<div class="hero-glow-card" style="text-align:center;padding:20px;">لا توجد مهام شركاء</div>';

async function doTask(tid, link, type, cat) {
  if (Date.now() - _lastClickTime < 3000) { showNotif('الرجاء الانتظار 3 ثواني!', 'w'); return; }
  _lastClickTime = Date.now();
  if (_taskInFlight.has(tid)) return;
  _taskInFlight.add(tid);
  if (link && link.startsWith('https://t.me/')) window.open(link, '_blank');
  showNotif('⏳ جاري التحقق من عضويتك...', 'i');
  setTimeout(async () => {
    try {
      const r = await api('verifyTask', { taskId: tid, taskType: type, taskCategory: cat });
      if (!S.doneTasks.includes(tid)) S.doneTasks.push(tid);
      if (r.snowAdded) { S.user.snow = (S.user.snow || 0) + r.snowAdded; updateUI(); showNotif(`🎉 +${fmt(r.snowAdded)} ثلج!`, 's'); }
      else showNotif(`✅ تم إكمال المهمة!`, 's');
      renderTasks();
    } catch (e) { showNotif(`❌ ${e.message || 'فشل التحقق'}`, 'e'); }
    finally { _taskInFlight.delete(tid); renderSocTasks(); }
  }, 3000);
}

async function claimRefTask(taskId) {
  if (Date.now() - _lastClickTime < 3000) { showNotif('الرجاء الانتظار 3 ثواني!', 'w'); return; }
  _lastClickTime = Date.now();
  try {
    const result = await api('claimTask', { taskId });
    S.user.snow = result.snow;
    S.doneTasks.push(taskId);
    updateUI();
    renderTasks();
    showNotif(`🎉 +${fmt(result.snowReward)} ثلج!`, 's');
  } catch (e) { showNotif(`❌ ${e.message || 'فشل الاستلام'}`, 'e'); }
}

function updateRefUI() {
  if (!S.userId) return;
  const link = `${CFG.BOT_APP_LINK}?startapp=${S.userId}`;
  const refInput = document.getElementById('refLinkInp');
  if (refInput) refInput.value = link;
  const cntEl = document.getElementById('totalRefsDisp');
  if (cntEl) cntEl.textContent = `${S.refs.length} أصدقاء`;
  const listEl = document.getElementById('recentRefsList');
  if (listEl) {
    if (!S.refs.length) listEl.innerHTML = '<div class="hero-glow-card" style="text-align:center;padding:15px;">لا يوجد إحالات بعد</div>';
    else listEl.innerHTML = S.refs.slice(0, 20).map(r => `<div class="ref-list-item" style="display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid rgba(255,255,255,0.05);"><div style="width:40px;height:40px;background:rgba(0,229,255,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;">${r.photo ? `<img src="${esc(r.photo)}" style="width:100%;height:100%;border-radius:50%;">` : '🎅'}</div><div style="flex:1;"><div style="font-weight:800;">${esc(r.name || 'صديق')}</div><div style="font-size:10px;color:var(--text-muted);">${esc(r.date || 'انضم مؤخراً')}</div></div><div style="color:var(--gold);">${r.totalCommissionEarned ? `+${fmt(r.totalCommissionEarned)}` : '0'}</div></div>`).join('');
  }
}

function copyRefLink() { const v = document.getElementById('refLinkInp').value; navigator.clipboard.writeText(v).then(() => showNotif('✅ تم نسخ الرابط!', 's')).catch(() => { showNotif('✅ تم نسخ الرابط!', 's'); }); }

function switchTaskTab(el, tab) {
  document.querySelectorAll('.task-tab').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  const socialTabs = document.getElementById('socialTabs');
  const partnerTasks = document.getElementById('partnerTasksList');
  const communityTasks = document.getElementById('communityTasksList');
  const referralTasks = document.getElementById('referralTasksList');
  if (tab === 'social') {
    socialTabs.style.display = 'flex';
    partnerTasks.style.display = 'block';
    communityTasks.style.display = 'none';
    referralTasks.style.display = 'none';
    document.getElementById('floatAddTask').style.display = _socTab === 'community' ? 'flex' : 'none';
  } else {
    socialTabs.style.display = 'none';
    partnerTasks.style.display = 'none';
    communityTasks.style.display = 'none';
    referralTasks.style.display = 'block';
    document.getElementById('floatAddTask').style.display = 'none';
  }
}

function switchSocTab(tab) {
  _socTab = tab;
  document.querySelectorAll('.category-tab').forEach((el, i) => { el.classList.toggle('active', (tab === 'partner' && i === 0) || (tab === 'community' && i === 1)); });
  document.getElementById('partnerTasksList').style.display = tab === 'partner' ? 'block' : 'none';
  document.getElementById('communityTasksList').style.display = tab === 'community' ? 'block' : 'none';
  document.getElementById('floatAddTask').style.display = tab === 'community' ? 'flex' : 'none';
}

function switchWalletTab(tab) {
  document.getElementById('walletDeposit').style.display = tab === 'deposit' ? 'block' : 'none';
  document.getElementById('walletWithdraw').style.display = tab === 'withdraw' ? 'block' : 'none';
  document.getElementById('walletExchange').style.display = tab === 'exchange' ? 'block' : 'none';
}

function goNav(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(el.dataset.s).classList.add('active');
}

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function updateSwapBals() { }
function renderExchHist() { }
function renderWdHist() { }

function ldProgress(pct, msg) {
  const fill = document.getElementById('loaderFill');
  if (fill) fill.style.width = pct + '%';
  const pctEl = document.getElementById('loaderPercent');
  if (pctEl) pctEl.textContent = Math.round(pct) + '%';
  const stat = document.getElementById('ldStatus');
  if (stat) stat.textContent = msg;
}

function ldHide() {
  const s = document.getElementById('loadingScreen');
  if (s) { s.classList.add('hidden'); setTimeout(() => s.remove(), 700); }
}

async function init() {
  const startTime = Date.now();
  const MIN_LOADING_MS = 3000;
  ldProgress(0, 'جاري التشغيل...');
  if (window.Telegram?.WebApp) {
    S.tg = window.Telegram.WebApp;
    S.tg.ready(); S.tg.expand();
    const u = S.tg.initDataUnsafe?.user;
    if (u) {
      S.userId = String(u.id);
      if (u.photo_url) {
        const av = document.getElementById('userAvatar');
        if (av) av.innerHTML = `<img src="${esc(u.photo_url)}" style="width:100%;height:100%;object-fit:cover;">`;
      }
    }
    let startParam = S.tg.initDataUnsafe?.start_param || S.tg.initDataUnsafe?.startParam || '';
    S.startParam = startParam.replace(/\D/g, '');
  }
  ldProgress(15, 'جاري تحميل الأصول...');
  await new Promise(r => setTimeout(r, 800));
  ldProgress(35, 'جاري تحميل حسابك...');
  let loaded = false;
  for (let i = 0; i < 5 && !loaded; i++) {
    try { await loadState(); if (S.user && S.userId) loaded = true; } catch(e) { await new Promise(r => setTimeout(r, 1500)); }
  }
  if (!loaded) { ldProgress(100, 'فشل الاتصال. الرجاء إعادة التشغيل.'); return; }
  ldProgress(70, 'جاري بناء الواجهة...');
  renderTasks();
  await new Promise(r => setTimeout(r, 500));
  ldProgress(90, 'جاري التجهيز...');
  startStorage();
  await new Promise(r => setTimeout(r, 500));
  ldProgress(100, 'جاهز! 🎅');
  const elapsed = Date.now() - startTime;
  if (elapsed < MIN_LOADING_MS) await new Promise(r => setTimeout(r, MIN_LOADING_MS - elapsed));
  ldHide();
}

window.addEventListener('load', init);
</script>
