<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>بالي رالي | سباق الواقع</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Arial', sans-serif;
            background: #0e0e12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        /* الحاوية الرئيسية - تصميم مشابه للصورة */
        .game-container {
            max-width: 520px;
            width: 100%;
            background: #101218;
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 140, 0, 0.2);
        }

        /* رأس الصورة - لون أسود نيون */
        .header {
            background: #07090e;
            padding: 12px 20px;
            text-align: center;
            border-bottom: 1px solid #ff6a00;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 800;
            color: #ff7700;
            letter-spacing: 1px;
            text-shadow: 0 0 2px #ffaa33;
        }
        .header p {
            font-size: 10px;
            color: #ffaa66;
            margin-top: 2px;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        /* منطقة العدادات مثل الصورة بالضبط: اسم + سرعة */
        .dashboard {
            background: #0a0c12;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #1e1f2c;
        }

        .player-card {
            flex: 1;
            background: #11141c;
            border-radius: 36px;
            padding: 8px 6px;
            text-align: center;
            border: 1px solid #2c2e3a;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.02), 0 6px 12px rgba(0,0,0,0.4);
        }

        .player-name {
            font-size: 13px;
            color: #ffaa55;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #1a1d26;
            display: inline-flex;
            padding: 4px 14px;
            border-radius: 40px;
            margin-bottom: 8px;
        }

        .player-speed {
            font-size: 44px;
            font-weight: 800;
            font-family: 'Monaco', 'Courier New', monospace;
            color: #ffaa44;
            text-shadow: 0 0 6px #ff6600;
            line-height: 1;
            letter-spacing: 2px;
        }

        .player-speed small {
            font-size: 14px;
            color: #aaa;
            font-weight: 500;
        }

        .timer-box {
            background: #000000cc;
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 60px;
            text-align: center;
            min-width: 100px;
            border: 1px solid #ff8c00;
            box-shadow: 0 0 10px rgba(255,140,0,0.3);
        }

        .timer-label {
            font-size: 9px;
            color: #ffaa66;
            letter-spacing: 1px;
        }

        .timer-value {
            font-size: 38px;
            font-weight: 800;
            font-family: monospace;
            color: #ffcc66;
            line-height: 1;
        }

        /* حلبة السباق - أسلوب واقعي داكن */
        .race-area {
            position: relative;
            height: 460px;
            overflow: hidden;
            background: #0c1018;
        }

        .road {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #141a24;
        }

        /* خطوط الطريق */
        .road-lines {
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            width: 5px;
            height: 100%;
            background: repeating-linear-gradient(to bottom, #ffcc88 0px, #ffcc88 30px, transparent 30px, transparent 60px);
            animation: moveLines 0.25s linear infinite;
            opacity: 0.8;
        }

        @keyframes moveLines {
            from { transform: translateX(-50%) translateY(0); }
            to { transform: translateX(-50%) translateY(60px); }
        }

        /* خط النهاية */
        .finish-line {
            position: absolute;
            top: 18px;
            left: 0;
            right: 0;
            height: 26px;
            background: repeating-linear-gradient(90deg, #fff 0px, #fff 18px, #1a1a1a 18px, #1a1a1a 36px);
            z-index: 10;
            border-top: 2px solid #ffaa44;
            border-bottom: 2px solid #ffaa44;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }

        /* السيارات */
        .car {
            position: absolute;
            width: 76px;
            height: 118px;
            transition: bottom 0.02s linear;
            z-index: 20;
            filter: drop-shadow(0 10px 14px rgba(0,0,0,0.5));
        }
        .car img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .user-car {
            left: 4%;
        }
        .ai-car {
            right: 4%;
        }

        /* مؤشر السرعة على السيارة مثل الصورة */
        .speed-tag {
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            backdrop-filter: blur(6px);
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: bold;
            color: #ffbb55;
            font-family: monospace;
            white-space: nowrap;
            border: 1px solid #ff7700;
            letter-spacing: 0.5px;
        }

        /* شاشات البداية والنتيجة - تصميم أنيق */
        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(7, 9, 14, 0.98);
            backdrop-filter: blur(14px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 48px;
        }

        .hidden {
            display: none !important;
        }

        .btn {
            background: linear-gradient(135deg, #ff6a00, #cc4400);
            border: none;
            padding: 14px 44px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            margin: 16px;
            box-shadow: 0 8px 20px rgba(255,85,0,0.5);
            transition: 0.2s;
            font-family: inherit;
        }
        .btn:active {
            transform: scale(0.96);
        }

        .stats {
            background: #0f121c;
            padding: 20px 32px;
            border-radius: 44px;
            text-align: center;
            border: 1px solid #ff7700;
            margin: 16px;
            width: 80%;
        }
        .stats div {
            margin: 10px 0;
            font-size: 17px;
            color: #ddd;
        }
        .stats span {
            color: #ffaa44;
            font-weight: bold;
            font-size: 24px;
        }

        .total-wins {
            background: #07090e;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            color: #ffaa66;
            border-top: 1px solid #2a2a35;
        }
        .total-wins span {
            color: #ff7700;
            font-weight: bold;
            font-size: 18px;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid #333;
            border-top: 4px solid #ff7700;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* ايقونات صغيرة */
        .user-badge, .ai-badge {
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <h1>🏁 بالي رالي 🏁</h1>
        <p>RALLY BALI • سباق السرعة • 10 ثوان</p>
    </div>

    <div class="dashboard">
        <div class="player-card">
            <div class="player-name">🏎️ أنت</div>
            <div class="player-speed" id="userSpeed">0<small>km/h</small></div>
        </div>
        <div class="timer-box">
            <div class="timer-label">⏱️ الوقت</div>
            <div class="timer-value" id="timer">10.00</div>
        </div>
        <div class="player-card">
            <div class="player-name">🤖 الخصم</div>
            <div class="player-speed" id="aiSpeed">0<small>km/h</small></div>
        </div>
    </div>

    <div class="race-area">
        <div class="road">
            <div class="road-lines"></div>
            <div class="finish-line"></div>
        </div>

        <div class="car user-car" id="userCar">
            <img src="https://i.supaimg.com/6da94571-9f1f-45c0-a629-23bfc48c3905/19185c38-4150-4c7f-aa97-56e33862464b.png" alt="سيارتك">
            <div class="speed-tag" id="userTag">0 km/h</div>
        </div>
        <div class="car ai-car" id="aiCar">
            <img src="https://i.supaimg.com/6da94571-9f1f-45c0-a629-23bfc48c3905/b2be5445-fcb1-4ac9-83a7-1e862e1a6490.png" alt="سيارة الخصم">
            <div class="speed-tag" id="aiTag">0 km/h</div>
        </div>
    </div>

    <!-- شاشة البداية -->
    <div class="overlay-screen" id="startScreen">
        <h1 style="font-size: 48px; margin-bottom: 10px;">🏎️💨</h1>
        <p style="margin-bottom: 30px; text-align: center; padding: 0 30px;">سباق حقيقي • 10 ثوان فقط • السرعة ثابتة</p>
        <button class="btn" onclick="startMatching()">🚦 انطلق 🚦</button>
    </div>

    <!-- شاشة البحث -->
    <div class="overlay-screen hidden" id="matchingScreen">
        <div class="loader"></div>
        <p style="margin-top: 25px; color: #ffaa66;">جاري تجهيز المنافس...</p>
    </div>

    <!-- شاشة النتيجة -->
    <div class="overlay-screen hidden" id="resultScreen">
        <div id="resultText" style="font-size: 38px; font-weight: bold; margin-bottom: 20px;"></div>
        <div class="stats">
            <div>⏱️ الزمن: <span id="resultTime">10.00</span> ث</div>
            <div>📏 مسافتك: <span id="resultUserDist">0</span> م</div>
            <div>📏 مسافة الخصم: <span id="resultAiDist">0</span> م</div>
            <div>🏁 سرعتك: <span id="resultUserSpeed">0</span> كم/س</div>
            <div>🏁 سرعة الخصم: <span id="resultAiSpeed">0</span> كم/س</div>
        </div>
        <button class="btn" onclick="resetGame()">🔄 سباق جديد</button>
    </div>

    <div class="total-wins">
        🏆 الانتصارات: <span id="winsCount">0</span> &nbsp;|&nbsp; 🏁 السباقات: <span id="racesCount">0</span>
    </div>
</div>

<script>
    // إعدادات السباق
    let userSpeed = 0, aiSpeed = 0;
    let userDist = 0, aiDist = 0;
    let raceInterval, timerInterval;
    let startTime = 0;
    let raceActive = false, raceFinished = false;
    const RACE_DURATION = 10;
    const MAX_DIST = 1000;
    
    // نظام سرعة ذكي لجعل السباق قريب من الصورة (أرقام واقعية 40-70 km/h لكن في الصورة 50-51)
    // لكننا نريد الحفاظ على إثارة من 90 إلى 160 كم/س مع إحساس عالي، 
    // ولجعل الأمر مثل الصورة سأضيف نطاقًا مثيرًا لكني سأحافظ على الطابع.
    // المهم التصميم البصري يطابق الصورة: ألوان داكنة، عدادات نيون، كروت السرعة.

    function loadStats() {
        let wins = localStorage.getItem('rallyWins') || 0;
        let races = localStorage.getItem('rallyRaces') || 0;
        document.getElementById('winsCount').innerText = wins;
        document.getElementById('racesCount').innerText = races;
    }

    function saveStats(won) {
        let wins = parseInt(localStorage.getItem('rallyWins') || 0);
        let races = parseInt(localStorage.getItem('rallyRaces') || 0);
        races++;
        if (won) wins++;
        localStorage.setItem('rallyWins', wins);
        localStorage.setItem('rallyRaces', races);
        document.getElementById('winsCount').innerText = wins;
        document.getElementById('racesCount').innerText = races;
    }

    function updateCarPosition() {
        // نحدد أقصى ارتفاع للسيارة حوالي 410px
        let maxBottom = 400;
        let userY = Math.min((userDist / MAX_DIST) * maxBottom, maxBottom);
        let aiY = Math.min((aiDist / MAX_DIST) * maxBottom, maxBottom);
        document.getElementById('userCar').style.bottom = `${userY}px`;
        document.getElementById('aiCar').style.bottom = `${aiY}px`;
    }

    // توليد سرعات مثيرة ولكن بنطاق مشابه لصور سباقات البالي
    function generateSpeed() {
        // سرعة حقيقية مثيرة : بين 95 و 165 كم/س
        let u = Math.floor(Math.random() * 75) + 90;   // 90-164
        let a = Math.floor(Math.random() * 75) + 90;
        return { user: u, ai: a };
    }

    function startMatching() {
        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('matchingScreen').classList.remove('hidden');
        setTimeout(() => {
            document.getElementById('matchingScreen').classList.add('hidden');
            startRace();
        }, 1200);
    }

    function startRace() {
        let speeds = generateSpeed();
        userSpeed = speeds.user;
        aiSpeed = speeds.ai;

        // تحديث واجهة العدادات بالضبط مثل الصورة: سرعة كبيرة
        document.getElementById('userSpeed').innerHTML = userSpeed + '<small>km/h</small>';
        document.getElementById('aiSpeed').innerHTML = aiSpeed + '<small>km/h</small>';
        document.getElementById('userTag').innerText = userSpeed + ' km/h';
        document.getElementById('aiTag').innerText = aiSpeed + ' km/h';

        userDist = 0;
        aiDist = 0;
        updateCarPosition();
        raceActive = true;
        raceFinished = false;
        startTime = performance.now();

        // مؤقت العد التنازلي
        timerInterval = setInterval(() => {
            if (!raceActive && raceFinished) return;
            let elapsed = (performance.now() - startTime) / 1000;
            let remaining = Math.max(0, RACE_DURATION - elapsed);
            document.getElementById('timer').innerText = remaining.toFixed(2);
            if (remaining <= 0 && !raceFinished) {
                endRace();
            }
        }, 28);

        // حركة السيارات بدقة عالية (60fps تقريبًا)
        raceInterval = setInterval(() => {
            if (!raceActive || raceFinished) return;
            let delta = 0.036;   // ~36ms
            let factor = 0.27777778 * delta;   // تحويل km/h إلى متر لكل ثانية ثم ضرب بالدلتا
            userDist = Math.min(userDist + userSpeed * factor, MAX_DIST);
            aiDist = Math.min(aiDist + aiSpeed * factor, MAX_DIST);
            updateCarPosition();
        }, 36);
    }

    function endRace() {
        if (raceFinished) return;
        raceFinished = true;
        raceActive = false;
        clearInterval(raceInterval);
        clearInterval(timerInterval);

        let userWon = userDist > aiDist;
        let isTie = Math.abs(userDist - aiDist) < 0.8;
        let resultMsg = '';
        if (isTie) {
            resultMsg = '🤝 تعادل مثير!';
            let races = parseInt(localStorage.getItem('rallyRaces') || 0) + 1;
            localStorage.setItem('rallyRaces', races);
            let currentWins = parseInt(localStorage.getItem('rallyWins') || 0);
            document.getElementById('winsCount').innerText = currentWins;
            document.getElementById('racesCount').innerText = races;
        } else if (userWon) {
            resultMsg = '🏆 فوز! أنت المتوج 🏆';
            saveStats(true);
        } else {
            resultMsg = '💥 خسارة... سرعة الخصم أقوى 💥';
            saveStats(false);
        }

        let resultDiv = document.getElementById('resultText');
        resultDiv.innerText = resultMsg;
        resultDiv.style.color = userWon && !isTie ? '#ffaa44' : (isTie ? '#ffcc88' : '#ff8866');
        document.getElementById('resultTime').innerText = RACE_DURATION.toFixed(2);
        document.getElementById('resultUserDist').innerText = Math.floor(userDist);
        document.getElementById('resultAiDist').innerText = Math.floor(aiDist);
        document.getElementById('resultUserSpeed').innerText = userSpeed;
        document.getElementById('resultAiSpeed').innerText = aiSpeed;

        setTimeout(() => {
            document.getElementById('resultScreen').classList.remove('hidden');
        }, 100);
    }

    function resetGame() {
        if (raceInterval) clearInterval(raceInterval);
        if (timerInterval) clearInterval(timerInterval);
        raceActive = false;
        raceFinished = true;
        document.getElementById('resultScreen').classList.add('hidden');
        document.getElementById('startScreen').classList.remove('hidden');
        userDist = 0; aiDist = 0;
        updateCarPosition();
        document.getElementById('userSpeed').innerHTML = '0<small>km/h</small>';
        document.getElementById('aiSpeed').innerHTML = '0<small>km/h</small>';
        document.getElementById('timer').innerText = '10.00';
        document.getElementById('userTag').innerText = '0 km/h';
        document.getElementById('aiTag').innerText = '0 km/h';
    }

    // إضافة تأثيرات تفاعلية بسيطة عند الضغط على الزر
    window.startMatching = startMatching;
    window.resetGame = resetGame;

    loadStats();
</script>
</body>
</html>
