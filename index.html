<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>بالي رالي | سباق الواقع</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', 'Arial', sans-serif;
            background: #0a0c12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* حاوية اللعبة - تصميم رياضي قاتم واقعي */
        .game-container {
            max-width: 550px;
            width: 100%;
            background: #0f1117;
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 100, 0, 0.3);
        }

        /* رأس الشاشة */
        .header {
            background: #080b10;
            padding: 14px 20px;
            text-align: center;
            border-bottom: 2px solid #ff3a00;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #ff5500;
            letter-spacing: 1px;
        }
        .header p {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        /* منطقة العدادات - زي الصورة بالضبط */
        .dashboard {
            background: #06080c;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #1f1f2a;
        }

        .player-card {
            flex: 1;
            background: #0c0f16;
            border-radius: 28px;
            padding: 10px 8px;
            text-align: center;
            border: 1px solid #2a2a35;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.03), 0 4px 12px rgba(0,0,0,0.5);
        }

        .player-name {
            font-size: 13px;
            color: #ffaa66;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .player-speed {
            font-size: 42px;
            font-weight: 800;
            font-family: 'Monaco', 'Courier New', monospace;
            color: #ffaa44;
            text-shadow: 0 0 8px #ff6600;
            line-height: 1.1;
        }

        .player-speed small {
            font-size: 14px;
            color: #888;
        }

        .timer-box {
            background: #000000;
            padding: 10px 18px;
            border-radius: 40px;
            text-align: center;
            min-width: 110px;
            border: 1px solid #ff5500;
            box-shadow: 0 0 12px rgba(255,85,0,0.3);
        }

        .timer-label {
            font-size: 10px;
            color: #ffaa66;
            letter-spacing: 1px;
        }

        .timer-value {
            font-size: 40px;
            font-weight: 800;
            font-family: monospace;
            color: #ffaa33;
            line-height: 1;
        }

        /* حلبة السباق - أسلوب واقعي داكن */
        .race-area {
            position: relative;
            height: 480px;
            overflow: hidden;
            background: #0e1419;
        }

        .road {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #1a1e26;
        }

        /* خطوط الطريق */
        .road-lines {
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            width: 6px;
            height: 100%;
            background: repeating-linear-gradient(to bottom, #ffcc77 0px, #ffcc77 35px, transparent 35px, transparent 70px);
            animation: moveLines 0.3s linear infinite;
            opacity: 0.7;
        }

        @keyframes moveLines {
            from { transform: translateX(-50%) translateY(0); }
            to { transform: translateX(-50%) translateY(70px); }
        }

        /* خط النهاية */
        .finish-line {
            position: absolute;
            top: 30px;
            left: 0;
            right: 0;
            height: 24px;
            background: repeating-linear-gradient(90deg, #fff 0px, #fff 20px, #222 20px, #222 40px);
            z-index: 10;
            border-top: 2px solid #ffaa44;
            border-bottom: 2px solid #ffaa44;
        }

        /* السيارات */
        .car {
            position: absolute;
            width: 80px;
            height: 120px;
            transition: bottom 0.02s linear;
            z-index: 20;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.6));
        }
        .car img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .user-car {
            left: 5%;
        }
        .ai-car {
            right: 5%;
        }

        /* مؤشر السرعة على السيارة */
        .speed-tag {
            position: absolute;
            bottom: -26px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            backdrop-filter: blur(4px);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            color: #ffaa44;
            font-family: monospace;
            white-space: nowrap;
            border: 1px solid #ff6600;
        }

        /* شاشات البداية والنتيجة */
        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(6, 8, 12, 0.98);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 48px;
        }

        .hidden {
            display: none !important;
        }

        .btn {
            background: linear-gradient(135deg, #ff5500, #cc3300);
            border: none;
            padding: 14px 42px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            margin: 16px;
            box-shadow: 0 8px 20px rgba(255,85,0,0.4);
            transition: 0.2s;
        }
        .btn:active {
            transform: scale(0.96);
        }

        .stats {
            background: #0c0f16;
            padding: 20px 32px;
            border-radius: 40px;
            text-align: center;
            border: 1px solid #ff5500;
            margin: 16px;
        }
        .stats div {
            margin: 10px 0;
            font-size: 18px;
            color: #ddd;
        }
        .stats span {
            color: #ffaa44;
            font-weight: bold;
            font-size: 24px;
        }

        .total-wins {
            background: #06080c;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            color: #ffaa66;
            border-top: 1px solid #2a2a35;
        }
        .total-wins span {
            color: #ff5500;
            font-weight: bold;
            font-size: 18px;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid #333;
            border-top: 4px solid #ff5500;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <h1>🏁 بالي رالي 🏁</h1>
        <p>RALLY BALI • سرعة ثابتة • 10 ثوان</p>
    </div>

    <div class="dashboard">
        <div class="player-card">
            <div class="player-name">🏎️ أنت</div>
            <div class="player-speed" id="userSpeed">0<small>km/h</small></div>
        </div>
        <div class="timer-box">
            <div class="timer-label">⏱️ الوقت</div>
            <div class="timer-value" id="timer">10.00</div>
        </div>
        <div class="player-card">
            <div class="player-name">🤖 الخصم</div>
            <div class="player-speed" id="aiSpeed">0<small>km/h</small></div>
        </div>
    </div>

    <div class="race-area">
        <div class="road">
            <div class="road-lines"></div>
            <div class="finish-line"></div>
        </div>

        <div class="car user-car" id="userCar">
            <img src="https://i.supaimg.com/6da94571-9f1f-45c0-a629-23bfc48c3905/19185c38-4150-4c7f-aa97-56e33862464b.png" alt="سيارتك">
            <div class="speed-tag" id="userTag">0 km/h</div>
        </div>
        <div class="car ai-car" id="aiCar">
            <img src="https://i.supaimg.com/6da94571-9f1f-45c0-a629-23bfc48c3905/b2be5445-fcb1-4ac9-83a7-1e862e1a6490.png" alt="سيارة الخصم">
            <div class="speed-tag" id="aiTag">0 km/h</div>
        </div>
    </div>

    <!-- شاشة البداية -->
    <div class="overlay-screen" id="startScreen">
        <h1 style="font-size: 48px; margin-bottom: 10px;">🏎️💨</h1>
        <p style="margin-bottom: 30px; text-align: center; padding: 0 30px;">سباق حقيقي • 10 ثوان فقط • السرعة ثابتة</p>
        <button class="btn" onclick="startMatching()">🚦 انطلق 🚦</button>
    </div>

    <!-- شاشة البحث -->
    <div class="overlay-screen hidden" id="matchingScreen">
        <div class="loader"></div>
        <p style="margin-top: 25px; color: #ffaa66;">جاري تجهيز المنافس...</p>
    </div>

    <!-- شاشة النتيجة -->
    <div class="overlay-screen hidden" id="resultScreen">
        <div id="resultText" style="font-size: 40px; font-weight: bold; margin-bottom: 20px;"></div>
        <div class="stats">
            <div>⏱️ الزمن: <span id="resultTime">10.00</span> ث</div>
            <div>📏 مسافتك: <span id="resultUserDist">0</span> م</div>
            <div>📏 مسافة الخصم: <span id="resultAiDist">0</span> م</div>
            <div>🏁 سرعتك: <span id="resultUserSpeed">0</span> كم/س</div>
            <div>🏁 سرعة الخصم: <span id="resultAiSpeed">0</span> كم/س</div>
        </div>
        <button class="btn" onclick="resetGame()">🔄 سباق جديد</button>
    </div>

    <div class="total-wins">
        🏆 الانتصارات: <span id="winsCount">0</span> &nbsp;|&nbsp; 🏁 السباقات: <span id="racesCount">0</span>
    </div>
</div>

<script>
    // إعدادات السباق
    let userSpeed = 0, aiSpeed = 0;
    let userDist = 0, aiDist = 0;
    let raceInterval, timerInterval;
    let startTime = 0;
    let raceActive = false, raceFinished = false;
    const RACE_DURATION = 10;
    const MAX_DIST = 1000;

    function loadStats() {
        let wins = localStorage.getItem('rallyWins') || 0;
        let races = localStorage.getItem('rallyRaces') || 0;
        document.getElementById('winsCount').innerText = wins;
        document.getElementById('racesCount').innerText = races;
    }

    function saveStats(won) {
        let wins = parseInt(localStorage.getItem('rallyWins') || 0);
        let races = parseInt(localStorage.getItem('rallyRaces') || 0);
        races++;
        if (won) wins++;
        localStorage.setItem('rallyWins', wins);
        localStorage.setItem('rallyRaces', races);
        document.getElementById('winsCount').innerText = wins;
        document.getElementById('racesCount').innerText = races;
    }

    function updateCarPosition() {
        let userY = (userDist / MAX_DIST) * 430;
        let aiY = (aiDist / MAX_DIST) * 430;
        document.getElementById('userCar').style.bottom = `${userY}px`;
        document.getElementById('aiCar').style.bottom = `${aiY}px`;
    }

    function generateSpeed() {
        let u = Math.floor(Math.random() * 70) + 90;   // 90-160
        let a = Math.floor(Math.random() * 70) + 90;
        return { user: u, ai: a };
    }

    function startMatching() {
        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('matchingScreen').classList.remove('hidden');
        setTimeout(() => {
            document.getElementById('matchingScreen').classList.add('hidden');
            startRace();
        }, 1200);
    }

    function startRace() {
        let speeds = generateSpeed();
        userSpeed = speeds.user;
        aiSpeed = speeds.ai;

        document.getElementById('userSpeed').innerHTML = userSpeed + '<small>km/h</small>';
        document.getElementById('aiSpeed').innerHTML = aiSpeed + '<small>km/h</small>';
        document.getElementById('userTag').innerText = userSpeed + ' km/h';
        document.getElementById('aiTag').innerText = aiSpeed + ' km/h';

        userDist = 0;
        aiDist = 0;
        updateCarPosition();
        raceActive = true;
        raceFinished = false;
        startTime = performance.now();

        // مؤقت العد التنازلي
        timerInterval = setInterval(() => {
            if (!raceActive && raceFinished) return;
            let elapsed = (performance.now() - startTime) / 1000;
            let remaining = Math.max(0, RACE_DURATION - elapsed);
            document.getElementById('timer').innerText = remaining.toFixed(2);
            if (remaining <= 0 && !raceFinished) {
                endRace();
            }
        }, 30);

        // حركة السيارات
        raceInterval = setInterval(() => {
            if (!raceActive || raceFinished) return;
            let delta = 0.038;
            let factor = 0.2777 * delta;
            userDist = Math.min(userDist + userSpeed * factor, MAX_DIST);
            aiDist = Math.min(aiDist + aiSpeed * factor, MAX_DIST);
            updateCarPosition();
        }, 38);
    }

    function endRace() {
        if (raceFinished) return;
        raceFinished = true;
        raceActive = false;
        clearInterval(raceInterval);
        clearInterval(timerInterval);

        let userWon = userDist > aiDist;
        let isTie = Math.abs(userDist - aiDist) < 0.5;
        let resultMsg = '';
        if (isTie) {
            resultMsg = '🤝 تعادل!';
            let races = parseInt(localStorage.getItem('rallyRaces') || 0) + 1;
            localStorage.setItem('rallyRaces', races);
            document.getElementById('winsCount').innerText = localStorage.getItem('rallyWins') || 0;
            document.getElementById('racesCount').innerText = races;
        } else if (userWon) {
            resultMsg = '🏆 فوز! أنت الأسرع 🏆';
            saveStats(true);
        } else {
            resultMsg = '💥 خسارة... سرعة الخصم أعلى 💥';
            saveStats(false);
        }

        let resultDiv = document.getElementById('resultText');
        resultDiv.innerText = resultMsg;
        resultDiv.style.color = userWon && !isTie ? '#ffaa44' : (isTie ? '#aaa' : '#ff6666');
        document.getElementById('resultTime').innerText = RACE_DURATION.toFixed(2);
        document.getElementById('resultUserDist').innerText = Math.floor(userDist);
        document.getElementById('resultAiDist').innerText = Math.floor(aiDist);
        document.getElementById('resultUserSpeed').innerText = userSpeed;
        document.getElementById('resultAiSpeed').innerText = aiSpeed;

        setTimeout(() => {
            document.getElementById('resultScreen').classList.remove('hidden');
        }, 100);
    }

    function resetGame() {
        if (raceInterval) clearInterval(raceInterval);
        if (timerInterval) clearInterval(timerInterval);
        raceActive = false;
        raceFinished = true;
        document.getElementById('resultScreen').classList.add('hidden');
        document.getElementById('startScreen').classList.remove('hidden');
        userDist = 0; aiDist = 0;
        updateCarPosition();
        document.getElementById('userSpeed').innerHTML = '0<small>km/h</small>';
        document.getElementById('aiSpeed').innerHTML = '0<small>km/h</small>';
        document.getElementById('timer').innerText = '10.00';
        document.getElementById('userTag').innerText = '0 km/h';
        document.getElementById('aiTag').innerText = '0 km/h';
    }

    loadStats();
</script>
</body>
</html>
