<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سباق الصحراء - تحدٍ مع الذكاء الاصطناعي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a2a1f 0%, #0e1a0c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Tahoma', system-ui, 'Cairo', sans-serif;
            padding: 20px;
        }

        /* الحاوية الرئيسية - محاكاة تصميم الصور */
        .game-container {
            background: #2b2b1f;
            border-radius: 48px;
            padding: 20px 24px 24px 24px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.1);
            border: 1px solid #e9c891;
        }

        .race-canvas-wrapper {
            background: #000000;
            border-radius: 28px;
            padding: 6px;
            box-shadow: inset 0 0 0 2px #f7e5b5, 0 12px 28px black;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #2c2e1e;
            border-radius: 24px;
            cursor: pointer;
            margin: 0 auto;
        }

        /* لوحة التحكم */
        .info-panel {
            margin-top: 20px;
            background: #efe3c9;
            border-radius: 36px;
            padding: 16px 20px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.1), 0 8px 14px rgba(0,0,0,0.2);
            border-bottom: 4px solid #b87c3a;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .player-card, .ai-card {
            background: #2f2a1f;
            border-radius: 28px;
            padding: 12px 20px;
            flex: 1;
            color: #ffefcf;
            text-shadow: 0 2px 2px black;
            box-shadow: inset 0 1px 0 #fffbee, 0 6px 0 #0f0e06;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 58px;
            height: 58px;
            background: #5b4c2e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid #f3cd81;
            background-color: #352c1a;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-info h3, .ai-info h3 {
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .speed-bar {
            background: #221f16;
            border-radius: 60px;
            height: 12px;
            width: 100%;
            margin-top: 8px;
            overflow: hidden;
        }

        .speed-fill {
            width: 0%;
            height: 100%;
            background: #ffb347;
            transition: width 0.1s linear;
        }

        .ai-fill {
            background: #3aa8ff;
        }

        .race-timer {
            background: #1e1b10;
            border-radius: 80px;
            padding: 10px 15px;
            text-align: center;
            margin: 10px 0;
        }

        .timer-digits {
            font-size: 2.6rem;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 5px;
            color: #fdd77a;
            background: #00000066;
            display: inline-block;
            padding: 0 20px;
            border-radius: 60px;
        }

        button {
            background: #e2b13b;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 14px 20px;
            border-radius: 60px;
            width: 100%;
            color: #2c1d0a;
            font-family: inherit;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 8px 0 #7a4c1a;
            margin-top: 12px;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: 0 4px 0 #7a4c1a;
        }
        .result-area {
            background: #080c03b3;
            margin-top: 14px;
            border-radius: 36px;
            padding: 12px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffdd99;
            backdrop-filter: blur(4px);
        }
        .layer-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 12px;
            color: #cdb286;
        }
        @media (max-width: 700px) {
            .player-card, .ai-card { padding: 8px 12px; }
            .avatar { width: 44px; height: 44px; }
            .timer-digits { font-size: 1.8rem; }
            button { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="race-canvas-wrapper">
            <canvas id="raceCanvas" width="1000" height="500" style="width:100%; height:auto; max-width:1000px; aspect-ratio:1000/500"></canvas>
        </div>
        <div class="info-panel">
            <div class="stats">
                <div class="player-card">
                    <div class="avatar"><img id="playerCarImg" src="https://i.supaimg.com/6da94571-9f1f-45c0-a629-23bfc48c3905/19185c38-4150-4c7f-aa97-56e33862464b.png" alt="عربيتي"></div>
                    <div class="player-info">
                        <h3>🚗 عربيتي</h3>
                        <div class="speed-bar"><div id="playerSpeedFill" class="speed-fill" style="width:0%"></div></div>
                        <span id="playerSpeedKm" style="font-size:0.8rem;">0 كم/س</span>
                    </div>
                </div>
                <div class="ai-card">
                    <div class="avatar"><img id="aiCarImg" src="https://i.supaimg.com/6da94571-9f1f-45c0-a629-23bfc48c3905/b2be5445-fcb1-4ac9-83a7-1e862e1a6490.png" alt="الذكاء الاصطناعي"></div>
                    <div class="ai-info">
                        <h3>🤖 AI المنافس</h3>
                        <div class="speed-bar"><div id="aiSpeedFill" class="speed-fill ai-fill" style="width:0%"></div></div>
                        <span id="aiSpeedKm" style="font-size:0.8rem;">0 كم/س</span>
                    </div>
                </div>
            </div>
            <div class="race-timer">
                <span class="timer-digits" id="timerDisplay">00:00</span>
            </div>
            <button id="startRaceBtn">🏁 بدء السباق 🏁</button>
            <div id="resultMessage" class="result-area">اضغط "بدء السباق" للتحدي!</div>
            <div class="layer-note">
                🏜️ الخلفية (جبال + أشجار + صحراء) | الطريق (بحر) | الطبقات من الخلف للأمام | نقطة التلاشي نحو وسط الجبال
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // -------- إعدادات السباق ----------
        const RACE_DURATION_MS = 10000;     // 10 ثواني
        const REFRESH_INTERVAL = 50;        // 50ms تحديث سلس (20fps للمؤثرات)
        
        // متغيرات حالة السباق
        let raceActive = false;
        let raceStartTime = 0;
        let raceEndTimer = null;
        let animationFrameId = null;
        let updateInterval = null;
        
        // سرعات (كم/س) لحظية
        let playerCurrentSpeed = 0;
        let aiCurrentSpeed = 0;
        
        // المسافة المقطوعة (بالنسبة المئوية لإنهاء السباق أو العرض التقدمي)
        let playerDistance = 0;     // 0 .. 1
        let aiDistance = 0;
        
        // قوة الذكاء الاصطناعي يتم اختيارها عشوائياً عند بدء السباق: 
        // إما اقوى ب 10% او اضعف ب 10% من اللاعب (بالمتوسط)
        let aiStrengthModifier = 1.0;   // يتم تعيينها عند startRace
        
        // سرعة اللاعب الأساسية (تتغير بشكل عشوائي ديناميكي ولكن بحدود)
        // الفكرة: سيارة اللاعب لها سرعة متوسطة ثابتة لكن بتذبذب بسيط لإثارة المشاهدة
        // ولكن AI يعتمد على modifier وبعض العشوائية لتكون المنافسة حية.
        // لنجعل سرعة اللاعب تتذبذب حول 220 كم/س +/- عشوائية
        const BASE_PLAYER_SPEED = 210;   // كم/س
        let playerRandomFactor = 1.0;
        
        // مرجع canvas
        const canvas = document.getElementById('raceCanvas');
        const ctx = canvas.getContext('2d');
        
        // أبعاد canvas الأصلية ثابتة
        canvas.width = 1000;
        canvas.height = 500;
        
        // صور الخلفية والطريق والعناصر حسب الصور المرفقة (ثلاث صور للطبيعة)
        const bgImages = {
            background: new Image(),   // الصورة الشاملة او الخلفية
            road: new Image(),
            overlay: new Image()
        };
        
        // تحميل الصور الثلاث التي تم توفيرها: 
        // الأولى خلفية شاملة (جبال وسماء) ، الثانية طبقة طريق ، الثالثة أشجار أو تفاصيل أمامية
        // ولكن حسب الوصف: الخلفية (مساحة + جبال + أشجار) والطريق (بحر) لتأجيل الصفات
        // سوف نستخدم الصور الثلاث لخلق العمق: 
        // الصورة رقم 1 (0ae1a9a0...) : خلفية الجبال والسماء
        // الصورة رقم 2 (21b6e3b0...) : طبقة الطريق (بحر من الرمال أو طريق)
        // الصورة رقم 3 (0dcf53dd...) : أشجار / نباتات أمامية 
        // سأقوم بترتيبهم حسب الطبقات من الخلف للأمام.
        const bgUrl1 = "https://i.supaimg.com/6da94571-9f1f-45c0-a629-23bfc48c3905/0ae1a9a0-cdd2-406c-bfea-324ce612f50d.jpg";
        const bgUrl2 = "https://i.supaimg.com/6da94571-9f1f-45c0-a629-23bfc48c3905/21b6e3b0-0db2-490e-bd9a-c1acd4b87e60.jpg";
        const bgUrl3 = "https://i.supaimg.com/6da94571-9f1f-45c0-a629-23bfc48c3905/0dcf53dd-12e8-445d-879b-aa363d970b90.jpg";
        
        bgImages.background.src = bgUrl1;
        bgImages.road.src = bgUrl2;
        bgImages.overlay.src = bgUrl3;
        
        // صور السيارات من الروابط
        const playerCar = new Image();
        const aiCar = new Image();
        playerCar.src = "https://i.supaimg.com/6da94571-9f1f-45c0-a629-23bfc48c3905/19185c38-4150-4c7f-aa97-56e33862464b.png";
        aiCar.src = "https://i.supaimg.com/6da94571-9f1f-45c0-a629-23bfc48c3905/b2be5445-fcb1-4ac9-83a7-1e862e1a6490.png";
        
        // عناصر DOM
        const timerDisplay = document.getElementById('timerDisplay');
        const startBtn = document.getElementById('startRaceBtn');
        const resultMsgDiv = document.getElementById('resultMessage');
        const playerSpeedFill = document.getElementById('playerSpeedFill');
        const aiSpeedFill = document.getElementById('aiSpeedFill');
        const playerSpeedKmSpan = document.getElementById('playerSpeedKm');
        const aiSpeedKmSpan = document.getElementById('aiSpeedKm');
        
        // ----- وظائف حساب السرعة والتقدم -----
        // سرعة اللاعب ديناميكية (محاكاة أداء متغير)
        function updatePlayerSpeedDynamics() {
            if (!raceActive) return;
            // تذبذب واقعي: بين 190 و 245 كم/س
            let variation = Math.sin(Date.now() * 0.008) * 18 + Math.random() * 8;
            let rawSpeed = BASE_PLAYER_SPEED + variation;
            rawSpeed = Math.min(280, Math.max(150, rawSpeed));
            playerCurrentSpeed = rawSpeed;
        }
        
        // سرعة AI تعتمد على playerSpeed * modifier + تذبذب
        function updateAISpeed() {
            if (!raceActive) return;
            let baseAi = playerCurrentSpeed * aiStrengthModifier;
            // إضافة تذبذب طفيف يجعل المنافسة طبيعية ±5%
            let aiVar = (Math.sin(Date.now() * 0.009) * 6) + (Math.random() * 5 - 2.5);
            let finalAi = baseAi + aiVar;
            finalAi = Math.min(300, Math.max(120, finalAi));
            aiCurrentSpeed = finalAi;
        }
        
        // تحديث المسافات بناءً على السرعات (كم/س -> مسافة مقطوعة لكل فترة زمنية)
        let lastTimestamp = 0;
        function updateDistances(nowMs) {
            if (!raceActive) return;
            if (lastTimestamp === 0) {
                lastTimestamp = nowMs;
                return;
            }
            let deltaSec = (nowMs - lastTimestamp) / 1000;
            if (deltaSec > 0.1) deltaSec = 0.05; // limit
            // تحويل السرعة كم/س -> كم/ثانية ثم مسافة مقطوعة (نسبة مئوية بالنسبة لمسافة السباق الافتراضية)
            // السباق مدة 10 ثواني بسرعة متوسطة ~ 210 كم/س = 58.3 م/ث، المسافة الكلية ~ 583 متر
            // نعامل المسافة كنسبة من خط النهاية (100%)، بافتراض أن السرعة القصوى تؤدي لقطع كامل المسافة خلال 10 ثواني 
            // ولكن لجعل العرض مثير، كلما زادت السرعة زادت نسبة التقدم. معادلة بسيطة:
            // السرعة المتوسطة المتوقعة 210 كم/س تقطع 100% خلال 10 ثواني. السرعة الفعلية تؤثر خطياً.
            // المسافة = المسافة المتراكمة + (السرعة / 210) * (deltaSec / 10)   لأن الـ 10 ثواني كاملة.
            // ولكن نستخدم عامل normalization.
            const REF_SPEED = 210; // كم/س
            const MAX_DIST_PER_RACE = 1.0; // 100%
            let playerIncrement = (playerCurrentSpeed / REF_SPEED) * (deltaSec / (RACE_DURATION_MS/1000));
            let aiIncrement = (aiCurrentSpeed / REF_SPEED) * (deltaSec / (RACE_DURATION_MS/1000));
            
            playerDistance = Math.min(1.0, playerDistance + playerIncrement);
            aiDistance = Math.min(1.0, aiDistance + aiIncrement);
            
            // تحديث أشرطة السرعة
            let playerPercent = (playerCurrentSpeed / 280) * 100;
            let aiPercent = (aiCurrentSpeed / 280) * 100;
            playerSpeedFill.style.width = `${Math.min(100, playerPercent)}%`;
            aiSpeedFill.style.width = `${Math.min(100, aiPercent)}%`;
            playerSpeedKmSpan.innerText = `${Math.floor(playerCurrentSpeed)} كم/س`;
            aiSpeedKmSpan.innerText = `${Math.floor(aiCurrentSpeed)} كم/س`;
        }
        
        // رسم المسار باستخدام الطبقات والمنظور (نقطة التلاشي)
        // سنقوم برسم الخلفية الثابتة (الصور) مع تأثير حركة على الطريق لتوحي بالسباق
        // لإضافة ديناميكية السيارات حسب المسافة، السيارات تتحرك للأمام على الطريق 
        // سأرسم السيارات بناءً على نسبة المسافة المقطوعة: x position ثابت ولكنه يعطي إيحاء التقدم من أسفل canvas إلى الأعلى
        // نحاكي سباق خطي: السيارات على يسار ويمين الطريق؟ لكن سأجعلهما جنباً لجنب مع مؤشر التقدم
        
        function drawScene() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. طبقة الخلفية الأساسية (الجبال والسماء) -> تمتد كاملة
            if (bgImages.background.complete && bgImages.background.naturalWidth > 0) {
                ctx.drawImage(bgImages.background, 0, 0, canvas.width, canvas.height);
            } else {
                // تدرج احتياطي
                ctx.fillStyle = "#8b6946";
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "#c9ae74";
                ctx.fillRect(0,canvas.height*0.5,canvas.width,canvas.height*0.5);
            }
            
            // 2. طبقة الطريق (بحر من الرمال) -> نرسمها مع تأثير إزاحة بسيطة حسب التقدم العام للسيارة الاقرب
            // لإعطاء إحساس بالسرعة نزيح الطريق عمودياً بناءً على متوسط المسافة
            let roadOffsetY = (playerDistance + aiDistance) / 2 * 30; // إزاحة طفيفة
            if (bgImages.road.complete && bgImages.road.naturalWidth) {
                ctx.save();
                // قص الطريق ليتناسب
                ctx.drawImage(bgImages.road, 0, roadOffsetY * 0.5, canvas.width, canvas.height);
                ctx.restore();
            } else {
                ctx.fillStyle = "#e0b070";
                ctx.fillRect(0, canvas.height*0.6, canvas.width, canvas.height*0.3);
            }
            
            // 3. طبقة الأشجار / التفاصيل الامامية (overlay)
            if (bgImages.overlay.complete && bgImages.overlay.naturalWidth) {
                ctx.drawImage(bgImages.overlay, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#5f824b";
                for(let i=0;i<12;i++) ctx.fillRect(30+i*80, canvas.height-80, 25, 70);
            }
            
            // رسم خطوط الطريق / نقطة التلاشي (تأكيد على الاعدادات من الصور)
            ctx.beginPath();
            ctx.strokeStyle = "#fff6cf";
            ctx.lineWidth = 3;
            let vanishX = canvas.width/2 + 15; // نحو وسط الجبال
            let vanishY = canvas.height*0.35;
            for(let i=-2; i<=2; i++) {
                ctx.beginPath();
                ctx.moveTo(vanishX + i*60, vanishY);
                ctx.lineTo(canvas.width/2 + i*180, canvas.height);
                ctx.stroke();
            }
            
            // ---- رسم السيارات بناءً على التقدم (المسافة) مع تأثير المنظور -----
            // المسافة من 0 إلى 1 ، كلما زادت المسافة تتجه السيارة للأعلى (نحو خط النهاية)
            let maxYStart = canvas.height - 70;
            let minYFinish = vanishY + 40;
            let playerY = maxYStart - (playerDistance * (maxYStart - minYFinish));
            let aiY = maxYStart - (aiDistance * (maxYStart - minYFinish));
            // تحديد المواقع الأفقية: اللاعب يسار الطريق قليلاً والمنافس يمين
            let playerX = canvas.width/2 - 120;
            let aiX = canvas.width/2 + 40;
            
            // حجم السيارات يتناقص مع الابتعاد (حسب Y)
            let playerScale = 0.7 + (1 - playerDistance) * 0.5;
            let aiScale = 0.7 + (1 - aiDistance) * 0.5;
            
            function drawCar(img, x, y, scaleVal) {
                if (!img.complete || img.naturalWidth===0) return;
                let w = 100 * scaleVal;
                let h = 60 * scaleVal;
                ctx.drawImage(img, x - w/2, y - h/2, w, h);
            }
            drawCar(playerCar, playerX, playerY, playerScale);
            drawCar(aiCar, aiX, aiY, aiScale);
            
            // إضافة تأثير دخان / غبار
            ctx.fillStyle = "rgba(200,160,100,0.4)";
            ctx.beginPath();
            ctx.ellipse(playerX-30, playerY+15, 18, 10, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(aiX-30, aiY+15, 18, 10, 0, 0, Math.PI*2);
            ctx.fill();
            
            // نص تقدم المسافة
            ctx.font = "bold 16px 'Segoe UI'";
            ctx.fillStyle = "#f9eec1";
            ctx.shadowBlur=4;
            ctx.fillText(`🏁 ${Math.floor(playerDistance*100)}%`, playerX-50, playerY-25);
            ctx.fillText(`🤖 ${Math.floor(aiDistance*100)}%`, aiX-40, aiY-25);
            ctx.shadowBlur=0;
        }
        
        // الحلقة الرئيسية للرسم وتحديث السرعة
        function animationLoop() {
            if (raceActive) {
                const now = performance.now();
                updateDistances(now);
                updatePlayerSpeedDynamics();
                updateAISpeed();
                // التحقق من النهاية (إذا تجاوز احدهم 100% أو انتهى الوقت)
                if (playerDistance >= 1.0 || aiDistance >= 1.0) {
                    finishRace("completed");
                }
                drawScene();
            } else {
                drawScene(); // رسم ثابت
            }
            animationFrameId = requestAnimationFrame(animationLoop);
        }
        
        // مؤقت العد التنازلي للسباق (10 ثوانٍ)
        let countdownInterval = null;
        function startRace() {
            if (raceActive) return;
            // إعادة تعيين كل شيء
            raceActive = true;
            playerDistance = 0;
            aiDistance = 0;
            playerCurrentSpeed = BASE_PLAYER_SPEED + Math.random() * 15;
            aiCurrentSpeed = playerCurrentSpeed;
            
            // تحديد قوة AI: إما اقوى 10% أو اضعف 10% (عشوائي متساوي)
            const randomChoice = Math.random() < 0.5 ? 1.10 : 0.90;
            aiStrengthModifier = randomChoice;
            // عرض رسالة للمستخدم توضح قوة الخصم
            let strengthText = (aiStrengthModifier > 1) ? "🚀 AI أقوى بنسبة 10% اليوم!" : "🍃 AI أضعف بنسبة 10% اليوم!";
            resultMsgDiv.innerHTML = `🔥 السباق بدأ! ${strengthText} مدة السباق 10 ثوانٍ 🔥`;
            
            // بدء المؤقت
            const startTime = Date.now();
            raceStartTime = startTime;
            lastTimestamp = performance.now();
            
            // تحديث عداد الثواني
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                if (!raceActive) {
                    clearInterval(countdownInterval);
                    return;
                }
                const elapsed = Date.now() - raceStartTime;
                const remaining = Math.max(0, RACE_DURATION_MS - elapsed);
                const secs = Math.floor(remaining / 1000);
                const ms = Math.floor((remaining % 1000) / 10);
                timerDisplay.innerText = `${secs.toString().padStart(2,'0')}:${ms.toString().padStart(2,'0')}`;
                if (remaining <= 0 && raceActive) {
                    finishRace("timeout");
                }
            }, 40);
            
            // تعيين مهلة لإنهاء السباق بعد 10 ثواني
            if (raceEndTimer) clearTimeout(raceEndTimer);
            raceEndTimer = setTimeout(() => {
                if (raceActive) finishRace("timeout");
            }, RACE_DURATION_MS);
        }
        
        function finishRace(reason) {
            if (!raceActive) return;
            raceActive = false;
            if (countdownInterval) clearInterval(countdownInterval);
            if (raceEndTimer) clearTimeout(raceEndTimer);
            
            let winnerMsg = "";
            let playerPer = (playerDistance*100).toFixed(1);
            let aiPer = (aiDistance*100).toFixed(1);
            
            if (playerDistance >= 1.0 && aiDistance >= 1.0) winnerMsg = "🤝 تعادل مذهل!";
            else if (playerDistance >= 1.0) winnerMsg = "🎉 فزت أنت! عربيتي أسطوري 🎉";
            else if (aiDistance >= 1.0) winnerMsg = "💀 الذكاء الاصطناعي فاز! حاول مجدداً 💀";
            else {
                // انتهى الوقت ، من تقدم أكثر
                if (playerDistance > aiDistance) winnerMsg = "🏆 فزت بفارق التقدم! رائع 🏆";
                else if (aiDistance > playerDistance) winnerMsg = "⚡ AI تفوق في نهاية السباق ⚡";
                else winnerMsg = "تعادل في الوقت!";
            }
            let strengthNote = (aiStrengthModifier > 1) ? " (كان AI أقوى 10%)" : (aiStrengthModifier < 1 ? " (كان AI أضعف 10%)" : "");
            resultMsgDiv.innerHTML = `${winnerMsg}<br>📊 تقدمك: ${playerPer}%  |  AI: ${aiPer}% ${strengthNote}<br>⏱️ انتهى السباق. اضغط بدء لسباق جديد!`;
            timerDisplay.innerText = "00:00";
            
            // تحديث نهائي للرسوم
            drawScene();
        }
        
        // إعادة ضبط يدوية
        function resetRaceUI() {
            if (raceActive) return;
            playerDistance = 0;
            aiDistance = 0;
            playerCurrentSpeed = 0;
            aiCurrentSpeed = 0;
            playerSpeedFill.style.width = "0%";
            aiSpeedFill.style.width = "0%";
            playerSpeedKmSpan.innerText = "0 كم/س";
            aiSpeedKmSpan.innerText = "0 كم/س";
            timerDisplay.innerText = "00:00";
            resultMsgDiv.innerHTML = "اضغط 'بدء السباق' للتحدي مع AI (قوة متغيرة ±10%)";
            drawScene();
        }
        
        startBtn.addEventListener('click', () => {
            if (raceActive) {
                // لا نسمح بالمقاطعة اثناء السباق، لكن نعطي تحذير
                resultMsgDiv.innerHTML = "⚠️ السباق جارٍ! انتظر حتى ينتهي 10 ثواني ⚠️";
                return;
            }
            resetRaceUI();
            startRace();
        });
        
        // بدء حلقة الرسم وانتظار تحميل الصور
        animationFrameId = requestAnimationFrame(animationLoop);
        // تحميل الصور مسبقاً
        Promise.all([
            new Promise(res => { if(bgImages.background.complete) res(); else bgImages.background.onload=res; }),
            new Promise(res => { if(bgImages.road.complete) res(); else bgImages.road.onload=res; }),
            new Promise(res => { if(bgImages.overlay.complete) res(); else bgImages.overlay.onload=res; }),
            new Promise(res => { if(playerCar.complete) res(); else playerCar.onload=res; }),
            new Promise(res => { if(aiCar.complete) res(); else aiCar.onload=res; })
        ]).then(()=>{
            drawScene();
        }).catch(()=>{ drawScene(); });
        
        // رسم أولي
        drawScene();
    })();
</script>
</body>
</html>
