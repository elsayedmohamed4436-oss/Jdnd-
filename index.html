<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سباق السيارات المحلي</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #333; color: white; }
        #track { width: 80%; height: 300px; background: #555; margin: 20px auto; position: relative; border: 5px solid #fff; overflow: hidden; }
        .car { width: 80px; height: 50px; position: absolute; left: 0; background-size: contain; background-repeat: no-repeat; }
        #player-car { top: 70px; background-image: url('https://i.supaimg.com/6da94571-9f1f-45c0-a629-23bfc48c3905/19185c38-4150-4c7f-aa97-56e33862464b.png'); }
        #ai-car { top: 180px; background-image: url('https://i.supaimg.com/6da94571-9f1f-45c0-a629-23bfc48c3905/b2be5445-fcb1-4ac9-83a7-1e862e1a6490.png'); }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>سباق البالي</h1>
    <button id="startBtn" onclick="startRace()">بدء السباق</button>
    <h2 id="status">اضغط للبدء</h2>

    <div id="track">
        <div id="player-car" class="car"></div>
        <div id="ai-car" class="car"></div>
    </div>

<script>
    function startRace() {
        const pCar = document.getElementById('player-car');
        const aCar = document.getElementById('ai-car');
        const status = document.getElementById('status');
        
        status.innerText = "جاري البحث عن منافس...";
        document.getElementById('startBtn').disabled = true;

        setTimeout(() => {
            status.innerText = "السباق بدأ!";
            let posP = 0, posA = 0;
            let speedP = 5; // سرعة اللاعب الثابتة
            let variation = Math.random() > 0.5 ? 1.10 : 0.90; // مرة أقوى أو أضعف بـ 10%
            let speedA = speedP * variation;

            let race = setInterval(() => {
                posP += speedP;
                posA += speedA;
                
                pCar.style.left = posP + 'px';
                aCar.style.left = posA + 'px';

                if (posP > 1000 || posA > 1000) {
                    clearInterval(race);
                    status.innerText = (posP > posA) ? "لقد فزت بالسباق!" : "لقد فاز الذكاء الاصطناعي!";
                    document.getElementById('startBtn').disabled = false;
                }
            }, 50);
        }, 2000); // تأخير المحاكاة لثانيتين كأنه بحث
    }
</script>
</body>
</html>
