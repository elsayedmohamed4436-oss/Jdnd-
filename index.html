<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سباق السيارات - أنت ضد الذكاء الاصطناعي</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* منع تحديد النصوص أثناء السباق */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* صندوق اللعبة الرئيسي */
        .race-container {
            background: #2c2c2c;
            border-radius: 60px 60px 40px 40px;
            padding: 20px 20px 30px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,255,0.2);
            border-bottom: 8px solid #f5c542;
        }

        /* مسار السباق (طريقان جنباً لجنب) */
        .track {
            background: #3e3e3e;
            border-radius: 30px;
            padding: 20px 10px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 0 3px #ffd966, 0 10px 20px rgba(0,0,0,0.3);
        }

        .lane {
            background: #2b2b2b;
            margin: 15px 0;
            padding: 15px 10px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 2px 3px rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        /* خطوط منتصف الطريق (متقطعة) */
        .lane::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            background: repeating-linear-gradient(90deg, #ffdd99 0px, #ffdd99 20px, #5a5a5a 20px, #5a5a5a 45px);
            opacity: 0.25;
            pointer-events: none;
        }

        /* منطقة اسم المتسابق والعربية */
        .racer-info {
            width: 140px;
            text-align: center;
            z-index: 2;
            background: rgba(0,0,0,0.6);
            padding: 8px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
        }

        .racer-name {
            font-weight: bold;
            color: #ffd966;
            text-shadow: 1px 1px 0 #5a3e00;
            margin-bottom: 5px;
        }

        .car-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            filter: drop-shadow(2px 4px 6px black);
            transition: all 0.05s linear;
        }

        /* مساحة حركة السيارة */
        .race-area {
            flex: 1;
            height: 90px;
            position: relative;
            background: #202020;
            border-radius: 50px;
            overflow: hidden;
            box-shadow: inset 0 0 0 2px #888;
        }

        .car-mover {
            position: absolute;
            bottom: 8px;
            right: 0; /* البداية من جهة اليمين (لأن السباق من اليمين لليسار أو العكس؟ طلبك "عربيتي علي طريق وعربية AI علي طريق جنبي" سنحرك من اليسار إلى اليمين أو العكس؟ الأفضل أن تكون النهاية جهة اليمين بداية من اليسار) */
            /* لكن المستخدم يريد "عربيتي علي طريق وعربية AI علي طريق جنبي ومده السباق 10 ثواني" سأجعل الحركة من اليسار (خط البداية) إلى اليمين (خط النهاية) */
            left: 0%;
            right: auto;
            transition: left 0.05s linear;
        }
        
        /* تعديل لجعل الحركة من اليسار إلى اليمين مع صورة السيارات */
        .car-mover {
            left: 0%;
            transform: translateX(-50%);
            bottom: 5px;
        }
        
        .car-mover img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px black);
        }

        /* خط النهاية (على اليمين) */
        .finish-line {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 12px;
            background: repeating-linear-gradient(45deg, #fff, #fff 10px, #000 10px, #000 20px);
            box-shadow: -2px 0 0 gold;
            z-index: 5;
        }

        /* لوحة التحكم والنتيجة */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        button {
            background: #f5a623;
            border: none;
            font-size: 28px;
            font-weight: bold;
            padding: 12px 35px;
            border-radius: 60px;
            color: #2c2c2c;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 6px 0 #a05e15;
            width: 220px;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #a05e15;
        }

        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .result-box {
            background: #1e1e1e;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: bold;
            color: #ffd966;
            text-align: center;
            min-width: 250px;
            border: 1px solid gold;
        }

        .difficulty {
            background: #000000aa;
            border-radius: 30px;
            padding: 6px 15px;
            color: white;
            font-size: 16px;
        }

        .timer {
            font-size: 32px;
            font-weight: bold;
            background: #010101aa;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 40px;
            letter-spacing: 2px;
        }

        footer {
            font-size: 12px;
            text-align: center;
            margin-top: 20px;
            color: #bbbbbb;
        }
        
        @media (max-width: 700px) {
            .racer-info { width: 100px; }
            .car-mover img { width: 60px; height: 60px; }
            .race-area { height: 70px; }
            button { font-size: 22px; padding: 8px 20px; width: 180px; }
        }
    </style>
</head>
<body>
<div class="race-container">
    <div class="track">
        <!-- حارة اللاعب (أنت) -->
        <div class="lane">
            <div class="racer-info">
                <div class="racer-name">🚗 عربيتي (أنت)</div>
                <img class="car-img" id="playerCarStatic" src="https://cdn-icons-png.flaticon.com/512/2933/3933256.png" alt="عربيتي">
            </div>
            <div class="race-area" id="playerTrack">
                <div class="car-mover" id="playerCarMover">
                    <img src="https://cdn-icons-png.flaticon.com/512/2933/3933256.png" alt="سيارة اللاعب">
                </div>
                <div class="finish-line"></div>
            </div>
        </div>

        <!-- حارة الذكاء الاصطناعي -->
        <div class="lane">
            <div class="racer-info">
                <div class="racer-name">🤖 الذكاء الاصطناعي</div>
                <img class="car-img" id="aiCarStatic" src="https://cdn-icons-png.flaticon.com/512/4712/4712036.png" alt="سيارة AI">
            </div>
            <div class="race-area" id="aiTrack">
                <div class="car-mover" id="aiCarMover">
                    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712036.png" alt="سيارة AI">
                </div>
                <div class="finish-line"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="difficulty" id="difficultyDisplay">⚡ جارٍ التحضير ⚡</div>
        <button id="startBtn">🏁 بدء السباق 🏁</button>
        <div class="result-box" id="resultMessage">اضغط بدء السباق</div>
        <div class="timer" id="timerDisplay">0.00</div>
    </div>
    <footer>※ سباق 10 ثوانٍ | الذكاء الاصطناعي أقوى منك بنسبة 10% مرة وأقل منك بنسبة 10% مرة ※</footer>
</div>

<script>
    // ---------- إعدادات اللعبة ----------
    const RACE_DURATION = 10; // 10 ثواني
    const TRACK_DISTANCE = 100; // 100% من العرض (من left:0% إلى left:100%)
    
    // عناصر DOM
    const startBtn = document.getElementById('startBtn');
    const resultDiv = document.getElementById('resultMessage');
    const timerDisplay = document.getElementById('timerDisplay');
    const difficultySpan = document.getElementById('difficultyDisplay');
    
    const playerMover = document.getElementById('playerCarMover');
    const aiMover = document.getElementById('aiCarMover');
    
    // متغيرات السباق
    let raceInterval = null;
    let startTime = 0;
    let animationFrame = null;
    let raceActive = false;
    
    // سرعة كل متسابق (نسبة المسافة لكل ثانية) - القيمة القصوى 100%/sec يعني يقطع المسافة كاملة خلال ثانية واحدة
    // لكن المدة 10 ثواني، لذا السرعة الطبيعية 10%/sec لتقطع 100% خلال 10 ثوانٍ
    const BASE_SPEED = 10; // % في الثانية (100%/10sec)
    
    let playerSpeed = BASE_SPEED;      // %/sec
    let aiSpeed = BASE_SPEED;
    
    // المتغيرات الخاصة بالجري
    let playerDistance = 0;   // 0% إلى 100%
    let aiDistance = 0;
    let raceResult = null;     // 'player', 'ai', 'tie'
    
    // ---- دالة تحديث صعوبة الذكاء الاصطناعي (أقوى 10% أو أضعف 10%) ----
    function setRandomDifficulty() {
        // 50% فرصة يكون AI أقوى منك بنسبة 10%، 50% أضعف منك بنسبة 10%
        const isStronger = Math.random() < 0.5; 
        if (isStronger) {
            // AI أقوى: سرعته = سرعة اللاعب + 10% من سرعة اللاعب
            aiSpeed = playerSpeed * 1.10;
            difficultySpan.innerHTML = "🔥 الذكاء الاصطناعي أقوى منك بنسبة 10% 🔥";
            difficultySpan.style.color = "#ff8888";
        } else {
            // AI أضعف: سرعته = سرعة اللاعب - 10% من سرعة اللاعب
            aiSpeed = playerSpeed * 0.90;
            difficultySpan.innerHTML = "🍃 الذكاء الاصطناعي أضعف منك بنسبة 10% 🍃";
            difficultySpan.style.color = "#aaffdd";
        }
        // تقريب السرعات لأرقام مفهومة
        aiSpeed = parseFloat(aiSpeed.toFixed(2));
        console.log(`السرعة: اللاعب ${playerSpeed}%/sec, AI ${aiSpeed}%/sec`);
    }
    
    // دالة إعادة ضبط مواقع السيارات والمتغيرات
    function resetRace() {
        if (raceInterval) {
            clearInterval(raceInterval);
            raceInterval = null;
        }
        if (animationFrame) {
            cancelAnimationFrame(animationFrame);
            animationFrame = null;
        }
        raceActive = false;
        playerDistance = 0;
        aiDistance = 0;
        updateCarPositions();
        resultDiv.innerHTML = "⏳ اضغط بدء السباق ⏳";
        timerDisplay.innerHTML = "0.00";
        startBtn.disabled = false;
        // تعيين الصعوبة بشكل عشوائي في كل سباق (الذكاء الاصطناعي يتغير)
        setRandomDifficulty();
    }
    
    // تحديث موقع السيارات بناءً على النسبة المقطوعة
    function updateCarPositions() {
        // نحد left كنسبة مئوية من عرض المسار (من left:0% إلى left:100%)
        // لكن لأننا نريد السيارة تبدأ من الحافة اليسرى وتصل إلى اليمين (خط النهاية)
        // نستخدم left: نسبه مئوية ولكن مع تحريك مركز الصورة (translateX(-50%)) حتى تلتصق الحافة.
        let playerPercent = Math.min(playerDistance, 100);
        let aiPercent = Math.min(aiDistance, 100);
        
        playerMover.style.left = playerPercent + '%';
        aiMover.style.left = aiPercent + '%';
        
        // اذا وصل أي منهما إلى 100% أو تجاوزها نضبطها
        if (playerPercent >= 100) playerMover.style.left = '100%';
        if (aiPercent >= 100) aiMover.style.left = '100%';
    }
    
    // دالة إنهاء السباق وعرض النتيجة
    function finishRace(reason = 'timeout') {
        if (!raceActive) return;
        raceActive = false;
        if (raceInterval) {
            clearInterval(raceInterval);
            raceInterval = null;
        }
        if (animationFrame) {
            cancelAnimationFrame(animationFrame);
            animationFrame = null;
        }
        
        let winnerText = '';
        // تحديد الفائز بناءً على المسافة المقطوعة
        const playerFinal = Math.min(playerDistance, 100);
        const aiFinal = Math.min(aiDistance, 100);
        
        if (playerFinal >= 100 && aiFinal >= 100) {
            winnerText = '🤝 تعادل! 🤝';
            raceResult = 'tie';
        } else if (playerFinal >= 100) {
            winnerText = '🎉 لقد فزت! عربيتك أسرع 🎉';
            raceResult = 'player';
        } else if (aiFinal >= 100) {
            winnerText = '💀 الذكاء الاصطناعي فاز! 💀';
            raceResult = 'ai';
        } else {
            // انتهى الوقت
            if (playerFinal > aiFinal) {
                winnerText = '🏆 فزت بفارق بسيط! (نهاية الوقت) 🏆';
                raceResult = 'player';
            } else if (aiFinal > playerFinal) {
                winnerText = '🤖 AI تغلب عليك في النهاية 🤖';
                raceResult = 'ai';
            } else {
                winnerText = 'تعادل في منتصف الطريق';
                raceResult = 'tie';
            }
        }
        
        resultDiv.innerHTML = winnerText;
        startBtn.disabled = false;
    }
    
    // حلقة السباق (تحديث المسافات كل 0.02 ثانية للحصول على حركة سلسة)
    function startRaceLoop() {
        const startTimestamp = performance.now() / 1000;
        let lastUpdate = startTimestamp;
        
        function step(nowMs) {
            const nowSec = nowMs / 1000;
            if (!raceActive) return;
            
            const delta = Math.min(0.05, nowSec - lastUpdate); // حد أقصى 0.05 ثانية
            if (delta <= 0) {
                animationFrame = requestAnimationFrame(step);
                lastUpdate = nowSec;
                return;
            }
            lastUpdate = nowSec;
            
            // تحديث المسافات بناءً على السرعة (%/sec)
            playerDistance += playerSpeed * delta;
            aiDistance += aiSpeed * delta;
            
            // منع تجاوز 100%
            if (playerDistance > 100) playerDistance = 100;
            if (aiDistance > 100) aiDistance = 100;
            
            updateCarPositions();
            
            // وقت السباق المتبقي
            const elapsed = nowSec - startTime;
            const remaining = Math.max(0, RACE_DURATION - elapsed);
            timerDisplay.innerHTML = remaining.toFixed(2);
            
            // شروط النهاية: أحدهم يصل إلى 100% أو انتهاء الوقت
            let shouldFinish = false;
            if (playerDistance >= 100 || aiDistance >= 100) {
                shouldFinish = true;
            } else if (elapsed >= RACE_DURATION) {
                shouldFinish = true;
            }
            
            if (shouldFinish) {
                finishRace();
                return;
            }
            
            animationFrame = requestAnimationFrame(step);
        }
        
        animationFrame = requestAnimationFrame(step);
    }
    
    // بدء السباق الجديد
    function startRace() {
        if (raceActive) return;
        // إعادة ضبط كامل
        resetRace();     // هذا يغير الصعوبة ويعيد ضبط المسافات ويمسح أي إنترفال
        // الآن نجهز السباق
        raceActive = true;
        startBtn.disabled = true;
        playerDistance = 0;
        aiDistance = 0;
        updateCarPositions();
        startTime = performance.now() / 1000;
        resultDiv.innerHTML = "🏎️ انطلق! 🏎️";
        
        // بدء الحلقة
        startRaceLoop();
        
        // تأمين إضافي: في حال علقت الحلقة، نضع مؤقت احتياطي (لكن الrequestAnimationFrame كافي)
    }
    
    // ربط زر البدء
    startBtn.addEventListener('click', startRace);
    
    // تهيئة أولية: تحديد سرعة اللاعب الأساسية وسرعة AI عشوائية
    playerSpeed = BASE_SPEED;   // 10%/sec
    setRandomDifficulty();      // AI speed يتغير
    
    // ضبط المواضع الأولية
    playerDistance = 0;
    aiDistance = 0;
    updateCarPositions();
    timerDisplay.innerHTML = "0.00";
    resultDiv.innerHTML = "جاهز! اضغط بدء السباق";
    
    // تذكير المستخدم: يمكنه تغيير صور السيارات عبر تعديل src للصور في HTML أو JS
    // بما أن روابط الصور الأصلية لا تعمل، أضفت روابط توضيحية، لكن المستخدم يستطيع تعديلها:
    // لاستخدام صورك: قم بتغيير الرابط في src للصور التالية:
    // الصورة الثابتة للاعب: document.getElementById('playerCarStatic').src = "رابط عربيتك"
    // الصورة المتحركة للاعب: document.querySelector('#playerCarMover img').src = "رابط عربيتك"
    // وكذلك للذكاء الاصطناعي.
    console.log("البوت جاهز - يمكنك تغيير صور السيارات عبر الكود أو من خلال خاصية فحص العنصر");
</script>
</body>
</html>
